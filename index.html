<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming soon</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF7F0;
    --peach:#FFE5CF;
    --apricot:#FFD2A8;
    --coral:#F28C5A;
    --honey:#E8924A;
    --cocoa:#5A3A2E;
    --cocoa-soft:#8A6A5A;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{height:100%;}

  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--cocoa);
    background:linear-gradient(180deg,var(--cream) 0%,var(--peach) 70%,var(--apricot) 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
    position:relative;
    padding:2rem;
  }

  /* the sun — signature element */
  .glow{
    position:absolute;
    top:50%;
    left:50%;
    width:min(120vw,900px);
    height:min(120vw,900px);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at center,
      rgba(255,209,150,0.9) 0%,
      rgba(255,181,128,0.55) 30%,
      rgba(255,181,128,0.18) 55%,
      rgba(255,181,128,0) 72%);
    border-radius:50%;
    z-index:0;
    animation:breathe 7s ease-in-out infinite;
    will-change:transform,opacity;
  }

  @keyframes breathe{
    0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.85;}
    50%{transform:translate(-50%,-50%) scale(1.08);opacity:1;}
  }

  .content{
    position:relative;
    z-index:1;
    max-width:34rem;
    animation:rise 1.1s cubic-bezier(0.2,0.8,0.2,1) both;
  }

  @keyframes rise{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  .eyebrow{
    font-size:0.78rem;
    font-weight:600;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--coral);
    margin-bottom:1.6rem;
    display:inline-flex;
    align-items:center;
    gap:0.7rem;
  }

  .eyebrow::before,.eyebrow::after{
    content:"";
    width:1.6rem;
    height:1px;
    background:var(--coral);
    opacity:0.5;
  }

  h1{
    font-family:'Fraunces',Georgia,serif;
    font-weight:500;
    font-size:clamp(2.6rem,7vw,4.4rem);
    line-height:1.08;
    letter-spacing:-0.01em;
    margin-bottom:1.3rem;
  }

  h1 em{
    font-style:italic;
    color:var(--honey);
  }

  p{
    font-size:clamp(1.02rem,2.4vw,1.18rem);
    line-height:1.65;
    color:var(--cocoa-soft);
    max-width:26rem;
    margin:0 auto;
  }

  .footer{
    position:absolute;
    bottom:1.8rem;
    left:0;
    right:0;
    z-index:1;
    font-size:0.82rem;
    color:var(--cocoa-soft);
    opacity:0.7;
  }

  @media (prefers-reduced-motion:reduce){
    .glow{animation:none;}
    .content{animation:none;}
  }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>

  <main class="content">
    <span class="eyebrow">Coming soon</span>
   
  </main>

  <div class="footer">&copy; <span id="year"></span> &middot; All rights reserved</div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
